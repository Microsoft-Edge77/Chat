<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>ThinkTalk</title>
  <style>
    body {
      background: #000;
      color: #1e90ff;
      font-family: Arial, sans-serif;
      max-width: 700px;
      margin: auto;
      padding: 20px;
    }

    h2 {
      text-align: center;
      color: #1e90ff;
      font-size: 32px;
      margin-bottom: 20px;
      letter-spacing: 1px;
    }

    #topbar {
      display: flex;
      justify-content: space-between;
      margin-bottom: 10px;
      font-size: 18px;
    }

    select {
      padding: 10px;
      background: #111;
      color: #1e90ff;
      border: 1px solid #1e90ff;
      border-radius: 5px;
    }

    #messages {
      height: 400px;
      overflow-y: auto;
      border: 1px solid #1e90ff;
      padding: 10px;
      margin-bottom: 15px;
      background: #111;
      border-radius: 5px;
    }

    .msg {
      background: #0a0a0a;
      border-left: 3px solid #1e90ff;
      padding: 8px;
      margin-bottom: 10px;
      border-radius: 5px;
    }

    .pseudo {
      font-weight: bold;
      color: #1e90ff;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      border: 1px solid #1e90ff;
      background: #111;
      color: #1e90ff;
      font-size: 16px;
      border-radius: 5px;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #1e90ff;
      color: white;
      border: none;
      font-size: 16px;
      cursor: pointer;
      border-radius: 5px;
      margin-top: 5px;
    }

    button:hover {
      background: #0b60c0;
    }
  </style>
</head>
<body>

<h2>💬 ThinkTalk</h2>

<div id="topbar">
  <span>Salon :</span>
  <select id="salon" onchange="loadMessages()">
    <option value="general">#general</option>
    <option value="gaming">#gaming</option>
    <option value="music">#music</option>
  </select>
</div>

<div id="messages"></div>

<input id="pseudo" placeholder="Choisis un pseudo">
<input id="messageInput" placeholder="Écris un message...">
<button onclick="sendMessage()">Envoyer</button>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getDatabase, ref, push, onChildAdded, off } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

  // 🔥 Configuration Firebase
  const firebaseConfig = {
    apiKey: "AIzaSyCrgPMXzSyS6NXNajPxr0x_J-CTESOtp5w",
    authDomain: "chat-github-6abb5.firebaseapp.com",
    databaseURL: "https://chat-github-6abb5-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "chat-github-6abb5",
    storageBucket: "chat-github-6abb5.firebasestorage.app",
    messagingSenderId: "1038562300660",
    appId: "1:1038562300660:web:b57b74a7539466e16384a1",
    measurementId: "G-D91PGFZDJX"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  // Charger pseudo depuis localStorage
  const pseudoInput = document.getElementById("pseudo");
  if (localStorage.getItem("pseudo")) {
    pseudoInput.value = localStorage.getItem("pseudo");
  }

  let currentListener = null;

  function loadMessages() {
    const salon = document.getElementById("salon").value;
    const messagesDiv = document.getElementById("messages");
    messagesDiv.innerHTML = "";

    if (currentListener) off(currentListener);

    const messagesRef = ref(db, "salons/" + salon);

    currentListener = onChildAdded(messagesRef, (data) => {
      const msg = data.val();
      const div = document.createElement("div");
      div.className = "msg";
      div.innerHTML = `<span class="pseudo">${msg.pseudo}</span><br>${msg.text}`;
      messagesDiv.appendChild(div);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    });
  }

  loadMessages();

  window.sendMessage = function() {
    const pseudo = pseudoInput.value.trim();
    const text = document.getElementById("messageInput").value.trim();
    const salon = document.getElementById("salon").value;

    if (!pseudo) {
      alert("Choisis un pseudo avant d'envoyer un message.");
      return;
    }

    localStorage.setItem("pseudo", pseudo);

    if (!text) return;

    const messagesRef = ref(db, "salons/" + salon);
    push(messagesRef, { pseudo, text });

    document.getElementById("messageInput").value = "";
  };
</script>

</body>
</html>
