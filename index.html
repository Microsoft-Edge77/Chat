<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Chat en ligne</title>
  <style>
    body {
      background: #000;
      color: #1e90ff; /* bleu foncé */
      font-family: Arial, sans-serif;
      max-width: 600px;
      margin: auto;
      padding: 20px;
    }

    h2 {
      text-align: center;
      color: #1e90ff;
    }

    #messages {
      height: 350px;
      overflow-y: auto;
      border: 1px solid #1e90ff;
      padding: 10px;
      margin-bottom: 15px;
      background: #111;
    }

    .msg {
      padding: 6px 4px;
      border-bottom: 1px solid #1e90ff33;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      border: 1px solid #1e90ff;
      background: #111;
      color: #1e90ff;
      font-size: 16px;
      border-radius: 5px;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #1e90ff;
      color: white;
      border: none;
      font-size: 16px;
      cursor: pointer;
      border-radius: 5px;
      margin-top: 5px;
    }

    button:hover {
      background: #0b60c0;
    }
  </style>
</head>
<body>

<h2>💬 Chat en ligne</h2>

<!-- Zone des messages -->
<div id="messages"></div>

<!-- Pseudo -->
<input id="pseudo" placeholder="Choisis un pseudo">

<!-- Message -->
<input id="messageInput" placeholder="Écris un message...">

<!-- Bouton -->
<button onclick="sendMessage()">Envoyer</button>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getDatabase, ref, push, onChildAdded } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

  // 🔥 Ta configuration Firebase
  const firebaseConfig = {
    apiKey: "AIzaSyCrgPMXzSyS6NXNajPxr0x_J-CTESOtp5w",
    authDomain: "chat-github-6abb5.firebaseapp.com",
    databaseURL: "https://chat-github-6abb5-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "chat-github-6abb5",
    storageBucket: "chat-github-6abb5.firebasestorage.app",
    messagingSenderId: "1038562300660",
    appId: "1:1038562300660:web:b57b74a7539466e16384a1",
    measurementId: "G-D91PGFZDJX"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const messagesRef = ref(db, "messages");

  // Affichage des messages en temps réel
  onChildAdded(messagesRef, (data) => {
    const msg = data.val();
    const div = document.createElement("div");
    div.className = "msg";
    div.innerHTML = `<strong>${msg.pseudo}</strong> : ${msg.text}`;
    document.getElementById("messages").appendChild(div);

    // Scroll automatique
    const messagesDiv = document.getElementById("messages");
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
  });

  // Envoi d’un message
  window.sendMessage = function() {
    const pseudo = document.getElementById("pseudo").value.trim();
    const text = document.getElementById("messageInput").value.trim();

    if (!pseudo) {
      alert("Choisis un pseudo avant d'envoyer un message.");
      return;
    }

    if (!text) return;

    push(messagesRef, { pseudo, text });
    document.getElementById("messageInput").value = "";
  };
</script>

</body>
</html>
